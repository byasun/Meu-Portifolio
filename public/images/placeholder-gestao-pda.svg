<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300" role="img" aria-labelledby="title desc">
  <title id="title">Gestao PDA Placeholder</title>
  <desc id="desc">Placeholder image for Gestao PDA project card.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a085" />
      <stop offset="100%" stop-color="#0e7a65" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16" />
